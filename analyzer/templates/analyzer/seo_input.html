{% extends "base.html" %}
{% block title %}SEO Analysis - ContentForge{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h2 class="mb-4">SEO Content Analysis</h2>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" id="seoForm" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.platform.id_for_label }}" class="form-label">Platform</label>
            {{ form.platform }}
          </div>
          <div class="mb-3">
            <label for="{{ form.content.id_for_label }}" class="form-label">Content / Topic</label>
            {{ form.content }}
            <div class="form-text">Describe your topic, keyword, or content idea in detail.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="analyzeBtn">
            <i class="bi bi-rocket-takeoff"></i> Analyze
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.getElementById('seoForm')?.addEventListener('submit', function() {
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Analyzing...';
});
</script>
{% endblock %}
